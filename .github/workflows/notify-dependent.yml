name: Notify Dependent Repo

on:
  workflow_run:
    workflows: ["NPM Publish"]
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Send Repository Dispatch Event
        run: |
          curl --fail -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/keshavsoft/vs-code-ext-express-api-gen-post-actions/dispatches \
            -d '{"event_type":"parent_package_updated","client_payload":{"parent_version":"${{ github.event.workflow_run.head_sha }}"}}'
