name: NPM Publish

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [publish-success]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        if: github.event_name == 'repository_dispatch'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update Dependency
        if: github.event_name == 'repository_dispatch'
        run: |
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.dependencies["kschema-fs-api-gen-rest"] = "^${{ github.event.client_payload.version }}";
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
          '

      - name: Bump Version
        if: github.event_name == 'repository_dispatch'
        run: |
          npm version patch -m "chore(deps): bump kschema-fs-api-gen-rest to ${{ github.event.client_payload.version }} [skip ci]"

      - name: Push version bump
        if: github.event_name == 'repository_dispatch'
        run: |
          git push origin HEAD:main --follow-tags

      - name: Check if local version is later than NPM
        id: check
        run: |
          node -e '
            const fs = require("fs");
            const { execSync } = require("child_process");

            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const name = pkg.name;
            const local = pkg.version;

            let remote = "0.0.0";
            try {
              remote = execSync(`npm view ${name} version`, { stdio: ["ignore", "pipe", "ignore"] }).toString().trim();
            } catch (err) {
              console.log(`Could not find package ${name} on npm. Defaulting remote to 0.0.0.`);
            }

            function compare(a, b) {
              const pa = a.split(".");
              const pb = b.split(".");
              for (let i = 0; i < 3; i++) {
                const na = Number(pa[i] || 0);
                const nb = Number(pb[i] || 0);
                if (na > nb) return 1;
                if (na < nb) return -1;
              }
              const aHasTag = a.includes("-");
              const bHasTag = b.includes("-");
              if (!aHasTag && bHasTag) return 1;
              if (aHasTag && !bHasTag) return -1;
              if (aHasTag && bHasTag) {
                const tagA = a.split("-")[1];
                const tagB = b.split("-")[1];
                return tagA.localeCompare(tagB, undefined, { numeric: true, sensitivity: "base" });
              }
              return 0;
            }

            const res = compare(local, remote);
            const isLater = res > 0;

            console.log(`Local Version (Repository): ${local}`);
            console.log(`Remote Version (NPM): ${remote}`);
            console.log(`Is local version later? ${isLater}`);

            if (process.env.GITHUB_OUTPUT) {
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `is_later=${isLater}\nlocal=${local}\nremote=${remote}\n`);
            }
          '

      - name: Publish to NPM
        if: steps.check.outputs.is_later == 'true' || github.event_name == 'repository_dispatch'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
